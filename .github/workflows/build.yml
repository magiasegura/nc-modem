name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: webui

env:
  # Tier 3 требует nightly, а в нём флаги меняются без предупреждения:
  # -Z build-std-features=panic_immediate_abort уже сломался на ровном месте.
  # Поэтому дата закреплена. Обновлять вручную и осознанно.
  RUST_NIGHTLY: nightly-2026-07-19
  # По той же причине закреплён и релиз кросстулчейнов: по ссылке latest
  # переименование ассета молча уронило бы сборку.
  MUSL_CROSS_RELEASE: "20260515"

jobs:
  # Тесты гоняем на хосте: они чистые, железо не нужно.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # aarch64 и armv7 — Tier 2, собираются стабильным Rust.
  build-tier2:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - target: armv7-unknown-linux-musleabihf
            cc: arm-linux-gnueabihf-gcc
            apt: gcc-arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - name: Build
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --config 'target.${{ matrix.target }}.linker="${{ matrix.cc }}"'
      - uses: actions/upload-artifact@v4
        with:
          name: modemui-${{ matrix.target }}
          path: webui/target/${{ matrix.target }}/release/modemui

  # mipsel/mips (MT7621 и родня) — Tier 3: готового std нет, нужен
  # nightly + build-std и настоящий musl-кросслинкер.
  # continue-on-error: даже если тут не сложится, релиз с aarch64/armv7 выйдет.
  build-mips:
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Таргеты mips*-unknown-linux-musl в Rust собираются с +soft-float
        # (проверено: rustc --print target-spec-json), а обычный musl-cross
        # тулчейн — hard-float. Смешивать нельзя: float-аргументы поедут
        # через разные регистры. Поэтому берём варианты с суффиксом sf.
        include:
          - target: mipsel-unknown-linux-musl
            toolchain: mipsel-unknown-linux-muslsf
          - target: mips-unknown-linux-musl
            toolchain: mips-unknown-linux-muslsf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY }}
          components: rust-src

      # Внутри архива верхний каталог с тем же именем и bin/<имя>-gcc.
      # musl.cc как запасной источник не используем: с раннеров GitHub он
      # стабильно недоступен и вешает джобу на таймаутах.
      - name: Fetch musl cross toolchain
        run: |
          curl -fL --retry 3 --retry-all-errors -o /tmp/tc.tar.xz \
            "https://github.com/musl-cross/musl-cross/releases/download/${MUSL_CROSS_RELEASE}/${{ matrix.toolchain }}.tar.xz"
          sudo mkdir -p /opt/cross
          sudo tar -xf /tmp/tc.tar.xz -C /opt/cross --strip-components=1
          test -x "/opt/cross/bin/${{ matrix.toolchain }}-gcc"
          echo "/opt/cross/bin" >> "$GITHUB_PATH"

      # Без -Z build-std-features=panic_immediate_abort: в свежих nightly это
      # уже не feature, а стратегия паники, и старый флаг ломает сборку core.
      # Это была лишь экономия размера — panic = "abort" в профиле релиза
      # и так убирает почти всю паник-машинерию.
      - name: Build
        run: |
          cargo "+${RUST_NIGHTLY}" build --release \
            -Z build-std=std,panic_abort \
            --target ${{ matrix.target }} \
            --config 'target.${{ matrix.target }}.linker="${{ matrix.toolchain }}-gcc"'

      # Ловим возврат рассогласования float-ABI. Проверка односторонняя:
      # падаем только если ABI явно назван hard, а если формат вывода
      # readelf изменится — просто ничего не найдём и не уроним сборку зря.
      - name: Verify soft-float ABI
        run: |
          BIN=webui/target/${{ matrix.target }}/release/modemui
          "/opt/cross/bin/${{ matrix.toolchain }}-readelf" -A "$BIN" | tee /tmp/abi.txt
          if grep -iq 'FP ABI.*hard' /tmp/abi.txt; then
            echo "::error::бинарь собран с hard-float, ожидался soft-float"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: modemui-${{ matrix.target }}
          path: webui/target/${{ matrix.target }}/release/modemui

  release:
    # always() нужен, чтобы падение build-mips не блокировало релиз через needs:
    # continue-on-error спасает от провала всего прогона, но зависимую джобу
    # всё равно может не пустить. Обязателен только build-tier2.
    if: |
      always()
      && startsWith(github.ref, 'refs/tags/v')
      && needs.build-tier2.result == 'success'
    needs: [build-tier2, build-mips]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist

      # download-artifact кладёт файлы относительно корня рабочей области,
      # а defaults.run.working-directory для всего workflow — webui.
      # Поэтому здесь путь задаётся явно.
      - name: Collect release assets
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          # Собираем в отдельный каталог: класть плоские файлы туда же, где
          # лежат одноимённые каталоги артефактов, — верный способ, чтобы mv
          # молча переместил файл внутрь каталога вместо переименования.
          mkdir -p out
          for d in dist/modemui-*/; do
            name=$(basename "$d")
            [ -f "$d/modemui" ] || continue
            cp "$d/modemui" "out/$name"
          done
          # lockband кладём и в релиз тоже, чтобы установленная версия CLI
          # соответствовала версии бинаря, а не текущему состоянию main.
          cp lockband out/lockband
          cp uninstall.sh out/uninstall.sh
          # Права всё равно не переживают выгрузку в релиз — setup.sh делает
          # chmod после скачивания. Ставим их ради предсказуемости логов.
          chmod +x out/*
          ls -l out
          # Хотя бы один бинарь обязан быть: пустой релиз хуже упавшей сборки.
          ls out/modemui-* >/dev/null

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          body: |
            Установка на роутер Keenetic с Entware:

            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/setup.sh | sh
            ```
